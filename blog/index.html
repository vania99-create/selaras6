<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Blog Selaras Yoga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #F4EFEA;
      color: #1F1F1F;
      max-width: 1000px;
      margin: auto;
      padding: 2rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: #fff;
      padding: 1rem;
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    p {
      font-size: 0.9rem;
      color: #555;
    }

    .back {
      display: block;
      margin-top: 2rem;
    }
  </style>
</head>

<body>

<h1>Journal Selaras</h1>

<div class="grid" id="blog-list"></div>

<a href="../" class="back">← Kembali ke Home</a>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('blog-list');

    data.reverse().forEach(article => {
      const card = `
        <a href="${article.slug}.html">
          <div class="card">
            <img src="${article.image}" alt="${article.title}">
            <h3>${article.title}</h3>
            <p>${article.excerpt}</p>
          </div>
        </a>
      `;
      container.innerHTML += card;
    });
  });
</script>

</body>
</html>
